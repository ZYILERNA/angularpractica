<div style="padding: 50px 20px; text-align: center;">
  <h2>Nuestros Servicios</h2>
  <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
    <mat-card *ngFor="let service of services" style="max-width: 300px; text-align: left;">
      <mat-card-header>
        <mat-card-title>{{ service.title }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p style="margin-top: 10px; margin-bottom: 20px;">{{ service.description }}</p>
        <mat-chip-listbox><mat-chip color="accent">{{ service.price }}</mat-chip></mat-chip-listbox>
      </mat-card-content>
    </mat-card>
  </div>
  <div style="margin-top: 60px; max-width: 600px; margin-left: auto; margin-right: auto;">
    <h2>Especial de la semana</h2>
    <app-hero-card title="Entrenamiento Personalizado" description="Un entrenador dedicado para alcanzar tus metas de forma segura y rápida."></app-hero-card>
  </div>
</div>

<div class="hero-card" style="padding: 24px; margin-bottom: 24px; border-radius: 8px;">
  <h3 class="hero-card__title" style="margin-top: 0;">{{ title }}</h3>
  <p>{{ description }}</p>
  <button class="hero-card__action" style="padding: 10px 20px; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; text-transform: uppercase;">Saber más</button>
</div>
